name: Build FitApp iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp fitapp.html www/index.html

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync assets into iOS project
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

          mkdir -p build/ipa/Payload
          cp -r "build/App.xcarchive/Products/Applications/App.app" build/ipa/Payload/
          cd build/ipa && zip -r FitApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FitApp-IPA
          path: build/ipa/FitApp.ipa
