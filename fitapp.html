<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FitApp">
<title>FitApp</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root {
  --bg: #F2F2F7;
  --card: #fff;
  --text: #000;
  --text2: #8E8E93;
  --border: rgba(60,60,67,0.15);
  --accent: #007AFF;
  --green: #34C759;
  --orange: #FF9500;
  --red: #FF3B30;
  --nav-h: 83px;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #1C1C1E; --card: #2C2C2E; --text: #fff; --border: rgba(255,255,255,0.1); }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); }
.screen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: var(--nav-h); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-top: calc(env(safe-area-inset-top, 44px) + 16px); }
.screen.active { display: block; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
h2 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
.card { background: var(--card); border-radius: 13px; margin-bottom: 12px; overflow: hidden; }
.card-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border); gap: 12px; }
.card-row:last-child { border-bottom: none; }
.sec-title { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin: 16px 4px 6px; }

/* Nav */
.nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(249,249,249,0.94); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom, 0px); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; }
@media (prefers-color-scheme: dark) { .nav { background: rgba(28,28,30,0.94); } }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: none; font-size: 10px; color: var(--text2); padding: 6px 4px 0; cursor: pointer; transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 23px; line-height: 1; margin-bottom: 1px; }

/* Badges */
.badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 600; }
.b-blue { background: #E1EDFF; color: #0040B0; }
.b-green { background: #E1F5E7; color: #1A7A35; }
.b-gray { background: #EBEBEB; color: #555; }
.b-orange { background: #FFF1DC; color: #8A4A00; }
@media (prefers-color-scheme: dark) {
  .b-blue { background: #0D2A5A; color: #6FB3FF; }
  .b-green { background: #0D3320; color: #5CD27A; }
  .b-gray { background: #3A3A3C; color: #AEAEB2; }
  .b-orange { background: #3A2000; color: #FFB340; }
}

/* Buttons */
.btn-primary { display: flex; align-items: center; justify-content: center; width: 100%; height: 52px; border-radius: 13px; font-size: 17px; font-weight: 600; background: var(--accent); color: white; border: none; cursor: pointer; }
.btn-danger { display: flex; align-items: center; justify-content: center; width: 100%; height: 52px; border-radius: 13px; font-size: 17px; font-weight: 600; background: var(--red); color: white; border: none; cursor: pointer; }
.btn-ghost { display: flex; align-items: center; justify-content: center; height: 52px; border-radius: 13px; font-size: 17px; font-weight: 600; background: var(--bg); color: var(--text2); border: none; cursor: pointer; flex: 1; }
.btn-edit { font-size: 13px; padding: 5px 13px; border-radius: 8px; background: rgba(0,122,255,0.1); color: var(--accent); border: none; cursor: pointer; font-weight: 500; flex-shrink: 0; }

/* Checkbox */
.check { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: all 0.18s; font-size: 13px; }
.check.done { background: var(--green); border-color: var(--green); color: white; }

/* Joggen */
#map { height: 230px; width: 100%; border-radius: 13px; overflow: hidden; margin-bottom: 12px; }
.run-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-box { background: var(--card); border-radius: 12px; padding: 13px 8px; text-align: center; }
.stat-num { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Modals */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; }
.modal-bg.open { display: flex; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 20px)); width: 100%; }
.modal h3 { font-size: 19px; font-weight: 700; margin-bottom: 16px; }
.modal input[type=number] { width: 100%; padding: 14px; font-size: 17px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); margin-bottom: 14px; -webkit-appearance: none; }
.modal-row { display: flex; gap: 10px; }

/* Effort */
.effort-row { display: flex; gap: 8px; margin-bottom: 16px; }
.eff-btn { flex: 1; padding: 11px; border-radius: 10px; font-size: 15px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; font-weight: 500; text-align: center; transition: all 0.15s; }
.eff-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(0,122,255,0.07); }

/* Day tabs */
.day-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 14px; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex-shrink: 0; padding: 7px 15px; border-radius: 99px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; background: var(--card); color: var(--text2); }
.day-tab.on { background: var(--accent); color: white; }

/* Lexikon */
.lex-row { display: flex; align-items: center; padding: 13px 16px; gap: 10px; cursor: pointer; }
.lex-row .chev { margin-left: auto; color: var(--text2); font-size: 15px; transition: transform 0.2s; display: inline-block; }
.lex-item.open .chev { transform: rotate(90deg); }
.lex-desc { display: none; padding: 0 16px 14px; font-size: 14px; color: var(--text2); line-height: 1.65; }
.lex-item.open .lex-desc { display: block; }
.lex-item + .lex-item { border-top: 0.5px solid var(--border); }

/* Progress */
.prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.prog-card { background: var(--card); border-radius: 13px; padding: 15px; }
.prog-lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.prog-val { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.prog-up { font-size: 12px; color: var(--green); margin-top: 3px; }
.prog-dn { font-size: 12px; color: var(--red); margin-top: 3px; }
.prog-eq { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* Run history row */
.run-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
.run-row:last-child { border-bottom: none; }

/* Protein bar */
.prot-bar-bg { height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-top: 8px; }
.prot-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s; }

/* empty */
.empty { text-align: center; padding: 36px 16px; color: var(--text2); font-size: 15px; }
</style>
</head>
<body>

<!-- Training -->
<div class="screen active" id="screen-training">
  <h1>Training</h1>
  <div class="day-tabs" id="train-tabs"></div>
  <div id="train-body"></div>
</div>

<!-- Essen -->
<div class="screen" id="screen-essen">
  <h1>Essen</h1>
  <div id="essen-day" style="font-size:15px;color:var(--text2);margin-bottom:14px;font-weight:500;"></div>
  <div id="essen-body"></div>
</div>

<!-- Joggen -->
<div class="screen" id="screen-joggen">
  <h1>Joggen</h1>
  <div id="map"></div>
  <div class="run-stats">
    <div class="stat-box"><div class="stat-num" id="r-km">0.00</div><div class="stat-lbl">km</div></div>
    <div class="stat-box"><div class="stat-num" id="r-time">00:00</div><div class="stat-lbl">Zeit</div></div>
    <div class="stat-box"><div class="stat-num" id="r-pace">--:--</div><div class="stat-lbl">min/km</div></div>
  </div>
  <button class="btn-primary" id="run-btn" onclick="toggleRun()">Start</button>
  <div class="sec-title">Letzte Läufe</div>
  <div class="card" id="run-hist"></div>
</div>

<!-- Fortschritt -->
<div class="screen" id="screen-fortschritt">
  <h1>Fortschritt</h1>
  <div id="prog-body"></div>
</div>

<!-- Lexikon -->
<div class="screen" id="screen-lexikon">
  <h1>Lexikon</h1>
  <div class="card" id="lex-body"></div>
</div>

<!-- Bottom Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="goTab('training')" id="nav-training">
    <div class="nav-icon">💪</div><div>Training</div>
  </button>
  <button class="nav-btn" onclick="goTab('essen')" id="nav-essen">
    <div class="nav-icon">🥗</div><div>Essen</div>
  </button>
  <button class="nav-btn" onclick="goTab('joggen')" id="nav-joggen">
    <div class="nav-icon">🏃</div><div>Joggen</div>
  </button>
  <button class="nav-btn" onclick="goTab('fortschritt')" id="nav-fortschritt">
    <div class="nav-icon">📈</div><div>Fortschritt</div>
  </button>
  <button class="nav-btn" onclick="goTab('lexikon')" id="nav-lexikon">
    <div class="nav-icon">📖</div><div>Lexikon</div>
  </button>
</nav>

<!-- Edit Weight Modal -->
<div class="modal-bg" id="m-edit">
  <div class="modal">
    <h3 id="m-edit-title">Gewicht ändern</h3>
    <input type="number" id="m-edit-val" placeholder="Gewicht in kg" step="0.5" inputmode="decimal">
    <div class="modal-row">
      <button class="btn-primary" onclick="saveW()" style="font-size:16px;height:46px;">Speichern</button>
      <button class="btn-ghost" onclick="closeEdit()" style="font-size:16px;height:46px;flex:0.6;">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Save Run Modal -->
<div class="modal-bg" id="m-run">
  <div class="modal">
    <h3>Lauf speichern</h3>
    <p style="color:var(--text2);font-size:14px;margin-bottom:14px;">Wie anstrengend war es?</p>
    <div class="effort-row">
      <div class="eff-btn" onclick="pickEffort(1,this)">😌 Leicht</div>
      <div class="eff-btn on" onclick="pickEffort(2,this)">💪 Mittel</div>
      <div class="eff-btn" onclick="pickEffort(3,this)">🔥 Hart</div>
    </div>
    <div class="modal-row">
      <button class="btn-primary" onclick="saveRun()" style="font-size:16px;height:46px;">Speichern</button>
      <button class="btn-ghost" onclick="discardRun()" style="font-size:16px;height:46px;flex:0.6;">Verwerfen</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const DAYS_SHORT = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const DAYS_LONG  = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

const DEFAULT_PLAN = [
  { type:'pause', typeName:'Pause', badge:'b-gray', name:'Pause / leichter Lauf',
    exercises:[ {name:'Optional Joggen', sets:1, reps:'20-30 Min', hw:false} ] },
  { type:'kombi', typeName:'Kombi', badge:'b-orange', name:'Joggen + Core',
    exercises:[
      {name:'Joggen', sets:1, reps:'30-40 Min', hw:false},
      {name:'Plank', sets:3, reps:'60 Sek', hw:false},
      {name:'Beinheben', sets:3, reps:'15', hw:false},
      {name:'Russian Twists', weight:4, sets:3, reps:'20', hw:true},
    ]},
  { type:'kraft', typeName:'Kraft', badge:'b-blue', name:'Rücken & Bizeps',
    exercises:[
      {name:'Kurzhantelrudern (einarmig)', weight:12, sets:4, reps:'10', hw:true},
      {name:'Seilzug Rudern', weight:15, sets:4, reps:'12', hw:true},
      {name:'Kurzhantel Curls', weight:9.5, sets:4, reps:'10', hw:true},
      {name:'Hammer Curls', weight:8, sets:3, reps:'12', hw:true},
    ]},
  { type:'joggen', typeName:'Joggen', badge:'b-green', name:'Joggen',
    exercises:[ {name:'Joggen', sets:1, reps:'30-40 Min', hw:false} ] },
  { type:'kraft', typeName:'Kraft', badge:'b-blue', name:'Schulter & Beine',
    exercises:[
      {name:'Schulterdrücken sitzend', weight:9.5, sets:4, reps:'10', hw:true},
      {name:'Seitheben', weight:4, sets:3, reps:'15', hw:true},
      {name:'Frontheben', weight:4, sets:3, reps:'12', hw:true},
      {name:'Goblet Squats', weight:12, sets:4, reps:'12', hw:true},
      {name:'Bulgarian Split Squats', weight:9.5, sets:3, reps:'10 je Bein', hw:true},
    ]},
  { type:'joggen', typeName:'Joggen', badge:'b-green', name:'Joggen',
    exercises:[ {name:'Joggen', sets:1, reps:'30 Min', hw:false} ] },
  { type:'kraft', typeName:'Kraft', badge:'b-blue', name:'Brust & Trizeps',
    exercises:[
      {name:'Langhantel Bankdrücken', weight:25, sets:3, reps:'10-12', hw:true},
      {name:'Kurzhantel Fliegende', weight:7, sets:3, reps:'12', hw:true},
      {name:'Seilzug Trizeps', weight:12.5, sets:3, reps:'12', hw:true},
    ]},
];

const SCHOOL_MEALS = [
  {time:'7:00',  item:'Haferflocken 100g + 250ml Milch + 2 Eier', prot:30},
  {time:'7:30',  item:'Shake: Quark 250g + Banane + 2EL Erdnussbutter + 250ml Milch + 80g Hafer', prot:50},
  {time:'17:00', item:'Reis 100g + Pute/Eier + Gemüse', prot:40},
  {time:'19:30', item:'3 Eier + Nudeln oder Quark', prot:25},
];
const FREE_MEALS = [
  {time:'9:00',  item:'Haferflocken 100g + 250ml Milch + 1 Banane', prot:20},
  {time:'12:30', item:'3 Eier + 100g Reis angebraten', prot:25},
  {time:'16:00', item:'1 Banane + 1 EL Erdnussbutter', prot:8},
  {time:'19:00', item:'Pute 200g + Reis oder Nudeln', prot:40},
];

const LEXIKON = [
  {name:'Langhantel Bankdrücken', desc:'Auf der Bank liegen, Stange schulterbreit greifen. Stange langsam (3 Sek) zur Brust absenken, dann explosiv hochdrücken. Rücken leicht gewölbt, Füße auf dem Boden. Brust spüren, nicht Schulter.'},
  {name:'Kurzhantel Fliegende', desc:'Auf der Bank liegen, Hanteln über der Brust, Arme leicht gebeugt (nie durchstrecken!). Arme wie beim Umarmen seitlich absenken bis Schulterhöhe, dann zurück oben zusammenführen. Langsam und kontrolliert.'},
  {name:'Seilzug Trizeps', desc:'Am Seilzug stehen, Stange/Seil auf Schulterhöhe greifen. Ellbogen bleibt ruhig am Körper. Seil nach unten drücken bis Arme ganz gestreckt, kurz halten, dann langsam zurück. Trizeps soll brennen.'},
  {name:'Kurzhantelrudern (einarmig)', desc:'Eine Hand und ein Knie auf der Bank abstützen. Mit der freien Hand die Hantel hochziehen bis zur Hüfte, Ellbogen nah am Körper halten. Rücken gerade, nicht verdrehen. Kein Schwung.'},
  {name:'Seilzug Rudern', desc:'Sitzend am Seilzug, Griff mit beiden Händen. Oberkörper leicht nach hinten, dann Griff zur Brust ziehen. Schulterblätter zusammenziehen. Langsam kontrolliert zurück. Rücken gerade halten.'},
  {name:'Kurzhantel Curls', desc:'Stehend, Hanteln in beiden Händen, Handflächen nach vorne. Ellbogen ruhig am Körper. Hanteln hochkurven bis Bizeps voll kontrahiert, kurz halten, dann langsam runter. Kein Schwingen.'},
  {name:'Hammer Curls', desc:'Wie normale Curls, aber mit neutralem Griff (Daumen oben, wie ein Hammer halten). Trainiert Bizeps und Unterarmmuskeln. Ellbogen ruhig halten.'},
  {name:'Schulterdrücken sitzend', desc:'Sitzend auf der Bank, Hanteln auf Schulterhohe. Hanteln nach oben drücken bis Arme gestreckt, dann langsam zurück auf Schulterhöhe. Rücken gerade, nicht ins Hohlkreuz fallen.'},
  {name:'Seitheben', desc:'Stehend, Hanteln seitlich am Körper. Arme leicht gebeugt, dann seitlich hochheben bis Schulterhöhe. Langsam und kontrolliert. Nicht mit Schwung, sonst trainierst du den Trapez, nicht die Schulter.'},
  {name:'Frontheben', desc:'Hanteln vor dem Körper. Abwechselnd oder beide zusammen nach vorne heben bis Schulterhöhe. Rücken gerade. Vordere Schulter (Deltoid anterior) wird trainiert.'},
  {name:'Goblet Squats', desc:'Stehend, Hantel vertikal vor der Brust halten (wie einen Kelch). Füße schulterbreit, Zehen leicht nach außen. Tief in die Knie, Oberkörper aufrecht bleiben. Bis Oberschenkel parallel zum Boden, dann hochdrücken.'},
  {name:'Bulgarian Split Squats', desc:'Hinteres Bein auf der Bank abstützen, vorderes Bein großen Schritt davor. Mit vorderem Bein in die Knie bis Hinterknie fast den Boden berührt. Schwieriger als normale Squats, gut für Balance und Quad.'},
  {name:'Plank', desc:'Unterarme auf dem Boden, Ellbogen unter den Schultern. Körper bildet eine gerade Linie von Kopf bis Fersen. Bauch und Po anspannen. Atmen! Nicht den Hintern hochstrecken oder durchhängen lassen.'},
  {name:'Beinheben', desc:'Auf dem Rücken liegen, Hände unter dem Po. Beine gestreckt zusammen langsam bis 90 Grad hochheben, dann langsam runter ohne den Boden zu berühren. Langsamer = schwieriger = besser.'},
  {name:'Russian Twists', desc:'Sitzen, Oberkörper 45 Grad nach hinten, Beine angehoben. Hantel oder Hände zusammen von links nach rechts drehen. Bauch die ganze Zeit angespannt. Langsam ist intensiver.'},
  {name:'Joggen (Technik)', desc:'Aufrechte Körperhaltung, leicht nach vorne geneigt. Arme gebeugt schwingen mit. Fuß landet unter dem Körper, nicht vor ihm. Atmen: 2 Schritte ein, 2 Schritte aus. Anfänger: locker bleiben, Pace ist egal.'},
];

// ─── State ────────────────────────────────────────────────────────────────────
let plan       = JSON.parse(localStorage.getItem('fp_plan') || 'null') || JSON.parse(JSON.stringify(DEFAULT_PLAN));
let runs       = JSON.parse(localStorage.getItem('fp_runs') || '[]');
let trainLogs  = JSON.parse(localStorage.getItem('fp_tlogs') || '{}');
let mealLogs   = JSON.parse(localStorage.getItem('fp_mlogs') || '{}');

function persist() {
  localStorage.setItem('fp_plan',  JSON.stringify(plan));
  localStorage.setItem('fp_runs',  JSON.stringify(runs));
  localStorage.setItem('fp_tlogs', JSON.stringify(trainLogs));
  localStorage.setItem('fp_mlogs', JSON.stringify(mealLogs));
}

function todayKey() { return new Date().toISOString().slice(0,10); }

// ─── Navigation ───────────────────────────────────────────────────────────────
let curTab = 'training';
function goTab(t) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + t).classList.add('active');
  document.getElementById('nav-' + t).classList.add('active');
  curTab = t;
  if (t === 'joggen' && !map) initMap();
  if (t === 'essen') drawEssen();
  if (t === 'fortschritt') drawProgress();
}

// ─── Training ─────────────────────────────────────────────────────────────────
let trainDay = new Date().getDay();
let editD, editI;

function drawTraining() {
  const dow = trainDay;
  const d   = plan[dow];
  const key = todayKey();
  const log = trainLogs[key] || {};

  // Tabs
  document.getElementById('train-tabs').innerHTML = DAYS_SHORT.map((s,i) =>
    `<button class="day-tab${i===dow?' on':''}" onclick="setTDay(${i})">${s}</button>`
  ).join('');

  // Exercises
  let h = `<div class="card"><div style="display:flex;align-items:center;gap:8px;padding:12px 16px 10px;border-bottom:0.5px solid var(--border);">
    <div style="font-size:16px;font-weight:600;">${d.name}</div>
    <span class="badge ${d.badge}">${d.typeName}</span>
  </div>`;
  d.exercises.forEach((ex,i) => {
    const done = !!log[i];
    h += `<div class="card-row">
      <div class="check${done?' done':''}" onclick="togEx(${i})">${done?'✓':''}</div>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:500;">${ex.name}</div>
        <div style="font-size:13px;color:var(--text2);">${ex.sets} × ${ex.reps}${ex.hw?' · <b>'+ex.weight+' kg</b>':''}</div>
      </div>
      ${ex.hw ? `<button class="btn-edit" onclick="openEdit(${dow},${i})">✎ kg</button>` : ''}
    </div>`;
  });
  h += '</div>';

  // Done count
  const done = Object.values(log).filter(Boolean).length;
  const total = d.exercises.length;
  h += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
    <div class="prot-bar-bg" style="flex:1;"><div class="prot-bar" style="width:${total?Math.round(done/total*100):0}%;background:var(--green);"></div></div>
    <div style="font-size:13px;color:var(--text2);flex-shrink:0;">${done}/${total} erledigt</div>
  </div>`;

  document.getElementById('train-body').innerHTML = h;
}

function setTDay(i) { trainDay = i; drawTraining(); }

function togEx(idx) {
  const key = todayKey();
  if (!trainLogs[key]) trainLogs[key] = {};
  trainLogs[key][idx] = !trainLogs[key][idx];
  persist(); drawTraining();
}

function openEdit(day, idx) {
  editD = day; editI = idx;
  document.getElementById('m-edit-title').textContent = plan[day].exercises[idx].name;
  document.getElementById('m-edit-val').value = plan[day].exercises[idx].weight || '';
  document.getElementById('m-edit').classList.add('open');
  setTimeout(() => document.getElementById('m-edit-val').focus(), 200);
}
function closeEdit() { document.getElementById('m-edit').classList.remove('open'); }
function saveW() {
  const v = parseFloat(document.getElementById('m-edit-val').value);
  if (!isNaN(v) && v > 0) { plan[editD].exercises[editI].weight = v; persist(); closeEdit(); drawTraining(); }
}

// ─── Essen ────────────────────────────────────────────────────────────────────
function isSchool(dow) { return dow >= 2 && dow <= 5; }

function drawEssen() {
  const dow   = new Date().getDay();
  const meals = isSchool(dow) ? SCHOOL_MEALS : FREE_MEALS;
  const key   = todayKey();
  const log   = mealLogs[key] || {};

  document.getElementById('essen-day').textContent =
    DAYS_LONG[dow] + (isSchool(dow) ? ' · Schultag' : ' · freier Tag');

  let done = 0, total = 0;
  meals.forEach((_,i) => { total++; if (log[i]) done++; });
  const protDone  = meals.reduce((a,m,i) => a + (log[i] ? m.prot : 0), 0);
  const protTotal = meals.reduce((a,m) => a + m.prot, 0);
  const pct = total ? Math.round(done/total*100) : 0;

  let h = `<div class="card" style="padding:16px 16px 14px;margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
      <div style="font-size:13px;color:var(--text2);font-weight:500;">Protein heute</div>
      <div><span style="font-size:22px;font-weight:700;">${protDone}g</span><span style="color:var(--text2);font-size:14px;"> / ~${protTotal}g</span></div>
    </div>
    <div class="prot-bar-bg"><div class="prot-bar" style="width:${Math.round(protDone/protTotal*100)}%;"></div></div>
    <div style="margin-top:10px;display:flex;justify-content:space-between;">
      <div style="font-size:13px;color:var(--text2);">Mahlzeiten</div>
      <div style="font-size:13px;color:var(--text2);">${done}/${total} abgehakt</div>
    </div>
    <div class="prot-bar-bg" style="margin-top:4px;"><div class="prot-bar" style="width:${pct}%;background:var(--green);"></div></div>
  </div>`;

  meals.forEach((m,i) => {
    const ok = !!log[i];
    h += `<div class="card" style="margin-bottom:9px;">
      <div class="card-row" style="border-bottom:none;">
        <div class="check${ok?' done':''}" onclick="togMeal(${i})">${ok?'✓':''}</div>
        <div style="flex:1;">
          <div style="font-size:12px;color:var(--text2);margin-bottom:3px;font-weight:500;">${m.time}</div>
          <div style="font-size:14px;font-weight:500;line-height:1.4;">${m.item}</div>
        </div>
        <div style="font-size:13px;color:var(--text2);flex-shrink:0;margin-left:8px;">~${m.prot}g P</div>
      </div>
    </div>`;
  });

  document.getElementById('essen-body').innerHTML = h;
}

function togMeal(idx) {
  const key = todayKey();
  if (!mealLogs[key]) mealLogs[key] = {};
  mealLogs[key][idx] = !mealLogs[key][idx];
  persist(); drawEssen();
}

// ─── Joggen (GPS) ─────────────────────────────────────────────────────────────
let map, routeLine, watchId;
let running = false, runStart, runDist = 0, lastPos = null, runTimer, coords = [];
let effort = 2;

function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  L.control.attribution({ prefix: '© OSM' }).addTo(map);
  routeLine = L.polyline([], { color: '#007AFF', weight: 5, opacity: 0.9 }).addTo(map);
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => map.setView([p.coords.latitude, p.coords.longitude], 16),
      () => map.setView([52.52, 13.405], 13)
    );
  } else {
    map.setView([52.52, 13.405], 13);
  }
  drawRunHist();
}

function toggleRun() {
  running ? stopRun() : startRun();
}

function startRun() {
  running = true; runStart = Date.now(); runDist = 0; lastPos = null; coords = [];
  routeLine.setLatLngs([]);
  document.getElementById('run-btn').textContent = 'Stop';
  document.getElementById('run-btn').className = 'btn-danger';
  runTimer = setInterval(tickTimer, 1000);
  watchId = navigator.geolocation.watchPosition(gpsUpdate, () => {}, { enableHighAccuracy: true, maximumAge: 1500 });
}

function gpsUpdate(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;
  if (acc > 35) return;
  if (lastPos) {
    const d = hav(lastPos.lat, lastPos.lng, lat, lng);
    if (d < 0.3) runDist += d;
  }
  lastPos = { lat, lng };
  coords.push([lat, lng]);
  routeLine.setLatLngs(coords);
  map.setView([lat, lng], 16);
  document.getElementById('r-km').textContent = runDist.toFixed(2);
  updatePaceDisplay();
}

function tickTimer() {
  const s = Math.floor((Date.now() - runStart) / 1000);
  document.getElementById('r-time').textContent = fmt2(Math.floor(s/60)) + ':' + fmt2(s%60);
  updatePaceDisplay();
}

function updatePaceDisplay() {
  if (runDist < 0.05) return;
  const mins = (Date.now() - runStart) / 60000;
  const pace = mins / runDist;
  document.getElementById('r-pace').textContent = Math.floor(pace) + ':' + fmt2(Math.round((pace%1)*60));
}

function stopRun() {
  running = false;
  clearInterval(runTimer);
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  document.getElementById('run-btn').textContent = 'Start';
  document.getElementById('run-btn').className = 'btn-primary';
  document.getElementById('m-run').classList.add('open');
}

function pickEffort(n, el) {
  effort = n;
  document.querySelectorAll('.eff-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
}

function saveRun() {
  const secs = Math.floor((Date.now() - runStart) / 1000);
  const pace  = runDist > 0.05 ? (secs/60) / runDist : 0;
  runs.unshift({ date: new Date().toISOString(), dist: runDist, time: secs, pace, effort: ['Leicht','Mittel','Hart'][effort-1], coords });
  if (runs.length > 60) runs.pop();
  persist();
  document.getElementById('m-run').classList.remove('open');
  resetRunUI(); drawRunHist();
}

function discardRun() {
  document.getElementById('m-run').classList.remove('open');
  resetRunUI(); routeLine.setLatLngs([]);
}

function resetRunUI() {
  document.getElementById('r-km').textContent = '0.00';
  document.getElementById('r-time').textContent = '00:00';
  document.getElementById('r-pace').textContent = '--:--';
}

function drawRunHist() {
  const el = document.getElementById('run-hist');
  if (!runs.length) { el.innerHTML = '<div class="empty">Noch keine Läufe gespeichert</div>'; return; }
  el.innerHTML = runs.slice(0,10).map(r => {
    const d = new Date(r.date);
    const ds = d.getDate() + '.' + (d.getMonth()+1) + '.' + String(d.getFullYear()).slice(2);
    const pm = Math.floor(r.pace), ps = Math.round((r.pace-pm)*60);
    const ps2 = fmt2(ps);
    const pStr = r.pace > 0 ? pm+':'+ps2+' /km' : '–';
    return `<div class="run-row">
      <div>
        <div style="font-weight:600;font-size:15px;">${r.dist.toFixed(2)} km</div>
        <div style="font-size:13px;color:var(--text2);">${ds} · ${pStr} · ${r.effort}</div>
      </div>
      <div style="font-size:14px;color:var(--text2);">${fmt2(Math.floor(r.time/60))}:${fmt2(r.time%60)}</div>
    </div>`;
  }).join('');
}

// ─── Fortschritt ──────────────────────────────────────────────────────────────
function drawProgress() {
  const tw = runsInWeek(0), lw = runsInWeek(1);
  const tkm = tw.reduce((a,r)=>a+r.dist,0), lkm = lw.reduce((a,r)=>a+r.dist,0);
  const tp = avgPace(tw), lp = avgPace(lw);

  // Meal completion last 7 days
  let mDone = 0, mTotal = 0;
  for (let i=0;i<7;i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const meals = isSchool(d.getDay()) ? SCHOOL_MEALS : FREE_MEALS;
    const log = mealLogs[key]||{};
    mTotal += meals.length;
    mDone  += Object.values(log).filter(Boolean).length;
  }
  const mPct = mTotal ? Math.round(mDone/mTotal*100) : 0;

  // Weight progress (check if any weights changed)
  const trainDoneThisWeek = Object.keys(trainLogs).filter(k => {
    const d = new Date(k); const now = new Date();
    const wStart = new Date(now); wStart.setDate(now.getDate()-now.getDay());
    return d >= wStart;
  }).length;

  function diffHtml(a, b, higherBetter=true, unit='') {
    if (!b) return `<div class="prog-eq">kein Vergleich</div>`;
    const d = a - b, pct = Math.round(Math.abs(d/b)*100);
    const better = higherBetter ? d>0 : d<0;
    const cls = d===0?'prog-eq':better?'prog-up':'prog-dn';
    const sign = d>0?'+':'';
    return `<div class="${cls}">${sign}${pct}% vs. Vorwoche</div>`;
  }

  let h = `
    <h2>Diese Woche</h2>
    <div class="prog-grid">
      <div class="prog-card">
        <div class="prog-lbl">Gelaufen</div>
        <div class="prog-val">${tkm.toFixed(1)} <span style="font-size:16px;font-weight:400;">km</span></div>
        ${diffHtml(tkm, lkm)}
      </div>
      <div class="prog-card">
        <div class="prog-lbl">Läufe</div>
        <div class="prog-val">${tw.length}</div>
        ${diffHtml(tw.length, lw.length)}
      </div>
      <div class="prog-card">
        <div class="prog-lbl">Ø Pace</div>
        <div class="prog-val" style="font-size:20px;">${tp}</div>
        ${tp!=='--:--'&&lp!=='--:--' ? diffHtml(paceNum(lp),paceNum(tp)) : '<div class="prog-eq">–</div>'}
      </div>
      <div class="prog-card">
        <div class="prog-lbl">Trainingstage</div>
        <div class="prog-val">${trainDoneThisWeek}</div>
        <div class="prog-eq" style="font-size:12px;margin-top:3px;">diese Woche</div>
      </div>
    </div>
    <h2>Mahlzeiten (7 Tage)</h2>
    <div class="card" style="padding:16px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <div style="font-size:15px;font-weight:600;">${mDone} / ${mTotal} abgehakt</div>
        <div style="font-size:15px;font-weight:700;color:var(--accent);">${mPct}%</div>
      </div>
      <div class="prot-bar-bg" style="height:8px;"><div class="prot-bar" style="width:${mPct}%;height:8px;"></div></div>
    </div>`;

  if (tw.length) {
    h += `<h2 style="margin-top:4px;">Läufe diese Woche</h2><div class="card">`;
    tw.forEach(r => {
      const d = new Date(r.date);
      const pm = Math.floor(r.pace), ps = fmt2(Math.round((r.pace-pm)*60));
      h += `<div class="run-row">
        <div>
          <div style="font-weight:600;">${r.dist.toFixed(2)} km · ${pm}:${ps} /km</div>
          <div style="font-size:13px;color:var(--text2);">${DAYS_LONG[d.getDay()]} · ${r.effort}</div>
        </div>
        <div style="font-size:14px;color:var(--text2);">${fmt2(Math.floor(r.time/60))}:${fmt2(r.time%60)}</div>
      </div>`;
    });
    h += '</div>';
  } else {
    h += `<div class="empty" style="padding:20px 0;">Noch keine Läufe diese Woche</div>`;
  }

  document.getElementById('prog-body').innerHTML = h;
}

// ─── Lexikon ─────────────────────────────────────────────────────────────────
function drawLexikon() {
  document.getElementById('lex-body').innerHTML = LEXIKON.map((l,i) =>
    `<div class="lex-item" id="lx${i}">
      <div class="lex-row" onclick="togLex(${i})">
        <div style="font-size:15px;font-weight:500;">${l.name}</div>
        <span class="chev">›</span>
      </div>
      <div class="lex-desc">${l.desc}</div>
    </div>`
  ).join('');
}

function togLex(i) { document.getElementById('lx'+i).classList.toggle('open'); }

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt2(n) { return String(Math.max(0,n)).padStart(2,'0'); }

function hav(la1,lo1,la2,lo2) {
  const R=6371, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function runsInWeek(wAgo) {
  const now=new Date(), s=new Date(now);
  s.setDate(now.getDate()-now.getDay()-wAgo*7); s.setHours(0,0,0,0);
  const e=new Date(s); e.setDate(s.getDate()+7);
  return runs.filter(r => { const d=new Date(r.date); return d>=s&&d<e; });
}

function avgPace(rs) {
  if (!rs.length||!rs.some(r=>r.dist>0.1)) return '--:--';
  const avg=rs.filter(r=>r.dist>0.1).reduce((a,r)=>a+r.pace,0)/rs.filter(r=>r.dist>0.1).length;
  return Math.floor(avg)+':'+fmt2(Math.round((avg%1)*60));
}

function paceNum(str) {
  if (str==='--:--') return 0;
  const [m,s]=str.split(':').map(Number); return m+s/60;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
drawTraining();
drawLexikon();

// Close modals on backdrop tap
document.getElementById('m-edit').addEventListener('click', function(e) { if(e.target===this) closeEdit(); });
document.getElementById('m-run').addEventListener('click', function(e) { if(e.target===this) discardRun(); });

// Prevent double-tap zoom
let lt=0;
document.addEventListener('touchend', e => { const n=Date.now(); if(n-lt<280) e.preventDefault(); lt=n; }, {passive:false});
</script>
